<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Deck & Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="visualizer-canvas"></canvas>

  <div class="container">
    
    <div class="editor-panel">
      <h3>🎛️ Deck Configuration</h3>
      
      <div class="form-group">
        <label for="edit-color">LED Accent Color</label>
        <input type="color" id="edit-color" value="#ff007f">
      </div>

      <hr class="panel-divider">

      <h4>🎵 Add Music</h4>
      
      <div class="form-group">
        <label>Upload MP3 File from Computer</label>
        <label for="local-file-input" class="file-upload-btn">📁 Choose MP3 File...</label>
        <input type="file" id="local-file-input" accept="audio/*" style="display: none;">
      </div>

      <div class="form-group" style="margin-top: 10px;">
        <label for="track-title-input">Or Enter Track Name</label>
        <input type="text" id="track-title-input" placeholder="e.g., Cyberpunk City">
      </div>
      
      <div class="form-group">
        <label for="track-url-input">Direct Audio URL (.mp3, HTTPS only)</label>
        <input type="text" id="track-url-input" placeholder="https://domain.com/music.mp3">
      </div>
      
      <button class="file-upload-btn" id="add-url-btn" style="background: #252530;">+ Add URL Track</button>
      <button class="btn-secondary" id="add-synth-btn">🎹 Add Procedural 80s Synth Track</button>

      <hr class="panel-divider">

      <h4>📋 Current Playlist</h4>
      <div id="playlist-container" class="playlist-box"></div>
    </div>

    <div class="retro-deck" id="player-deck">
      <div class="deck-header">
        <div>STEREO CASSETTE DECK</div>
        <div>MODEL JS-404 AV</div>
      </div>

      <div class="display-screen">
        <div class="track-title-display" id="display-title">SELECT A TRACK</div>
        <div class="status-row">
          <div id="status-text">STOP</div>
          <div id="display-time">00:00</div>
        </div>
        <div class="vu-meter">
          <div class="vu-bar" id="vu-left"></div>
        </div>
      </div>

      <div class="cassette-well">
        <div class="window-cutout">
          <div class="spindle spindle-left" id="spindle-l"></div>
          <div class="spindle spindle-right" id="spindle-r"></div>
        </div>
      </div>

      <audio id="main-audio" crossorigin="anonymous"></audio>

      <div class="transport-buttons">
        <button class="deck-btn" id="btn-play">▶ PLAY</button>
        <button class="deck-btn" id="btn-pause">❚❚ PAUSE</button>
        <button class="deck-btn" id="btn-stop">■ STOP</button>
      </div>

      <div class="wave-selector-container">
        <label>Visualizer Wave Mode:</label>
        <div class="wave-options">
          <button class="wave-opt-btn active" data-style="bars">Retro Bars</button>
          <button class="wave-opt-btn" data-style="sine">Sine Wave</button>
          <button class="wave-opt-btn" data-style="pulse">Cyber Pulse</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
